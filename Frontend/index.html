    <!DOCTYPE html>
    <html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    </head>
    <body class="auth-page">

    <div class="auth-card">
        <div class="logo-badge">GDEA</div>
        <h1 class="auth-title">Gestor de Eventos</h1>
        <p class="auth-subtitle">Ingresa con tu cuenta para acceder al sistema</p>

        <label for="email">Correo institucional</label>
        <input type="email" id="email" placeholder="usuario@universidad.edu.co">

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••">

        <button onclick="login()">Iniciar sesión</button>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    </body>
    </html>

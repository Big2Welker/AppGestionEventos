<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú principal</title>
  <link rel="stylesheet" href="css/menu_styles.css">
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <main class="dashboard-page">
    <section class="dashboard-shell">

      <header class="hero">
        <div class="hero-copy">
          <span class="hero-pill">Panel de control</span>
          <h1>Menú principal</h1>
          <p>
            Administra eventos, instalaciones y operaciones del sistema
            desde una interfaz más clara, moderna y poderosa.
          </p>
        </div>

        <div class="hero-side">

          <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
        </div>
      </header>

      <section class="dashboard-panel">
        <div class="panel-header">
          <div>
            <span class="section-kicker">Navegación</span>
            <h2>Acciones disponibles</h2>
            <p>Selecciona una opción para continuar</p>
          </div>
        </div>

        <div id="acciones" class="acciones-grid"></div>
      </section>

    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
